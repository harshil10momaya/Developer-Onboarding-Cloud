apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: dev-onboarding
data:
  FRONTEND_URL: "http://localhost"
  REDIS_URL: "redis://redis-service:6379/0"
  DEBUG: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: dev-onboarding
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres123@postgres-service:5432/dev_onboarding"
  SECRET_KEY: "k8s-production-secret-key-change-this"
  GEMINI_API_KEY: "your-gemini-api-key"
