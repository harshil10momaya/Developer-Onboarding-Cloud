global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI Backend
  - job_name: "fastapi-backend"
    metrics_path: /api/health
    static_configs:
      - targets: ["backend:8000"]
    scrape_interval: 10s

  # PostgreSQL (if postgres_exporter added)
  # - job_name: "postgres"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # Redis
  # - job_name: "redis"
