apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: onboarding-ingress
  namespace: onboarding-cloud
  annotations:
    kubernetes.io/ingress.class: nginx
    # If using AWS LB Controller, use:
    # kubernetes.io/ingress.class: alb
    # alb.ingress.kubernetes.io/scheme: internet-facing
spec:
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
