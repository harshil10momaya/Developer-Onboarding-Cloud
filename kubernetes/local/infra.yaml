apiVersion: v1
kind: Namespace
metadata:
  name: onboarding-cloud
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: onboarding-cloud
spec:
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: onboarding-cloud
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
